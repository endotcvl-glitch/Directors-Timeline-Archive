    <main class="info-container note-container">
        <article class="note-article" id="note-article">
            <p class="info-kicker">EDITOR'S NOTE</p>
            <p class="note-empty">Editor's Noteを読み込んでいます。</p>
        </article>

        <p class="note-back-link"><a href="index.html">Back to Home</a></p>
    </main>

    <script src="editor-notes.js?v=editor-note-20260625"></script>
    <script>
    function getNoteId() {
        return new URLSearchParams(window.location.search).get('id') || '';
    }

    function appendTextElement(parent, tagName, className, text) {
        const element = document.createElement(tagName);
        if (className) {
            element.className = className;
        }
        element.textContent = text;
        parent.appendChild(element);
        return element;
    }

    function renderNoteDetail() {
        const container = document.getElementById('note-article');
        const notes = window.editorNotes || [];
        const note = notes.find(item => item.id === getNoteId()) || notes[0];

        if (!container || !note) {
            return;
        }

        document.title = `${note.title}｜Directors' Timeline Archive`;
        const description = document.querySelector('meta[name="description"]');
        if (description) {
            description.setAttribute('content', note.excerpt);
        }
        const canonical = document.querySelector('link[rel="canonical"]');
        const noteUrl = `https://directors-timeline-archive.com/note.html?id=${encodeURIComponent(note.id)}`;
        if (canonical) {
            canonical.setAttribute('href', noteUrl);
        }
        [
            ['meta[property="og:title"]', `${note.title}｜Directors' Timeline Archive`],
            ['meta[property="og:description"]', note.excerpt],
            ['meta[property="og:url"]', noteUrl],
            ['meta[name="twitter:title"]', `${note.title}｜Directors' Timeline Archive`],
            ['meta[name="twitter:description"]', note.excerpt]
        ].forEach(([selector, value]) => {
            const meta = document.querySelector(selector);
            if (meta) {
                meta.setAttribute('content', value);
            }
        });

        container.innerHTML = '';
        appendTextElement(container, 'p', 'info-kicker', "EDITOR'S NOTE");
        appendTextElement(container, 'p', 'note-heading', note.heading);
        appendTextElement(container, 'h1', '', note.title);
        appendTextElement(container, 'p', 'note-meta', `${note.directorNameJa} (${note.directorName}) / ${note.filmTitleJa} (${note.filmTitle}) / ${note.year}`);

        const body = document.createElement('div');
        body.className = 'note-body';
        note.body.forEach(paragraph => {
            appendTextElement(body, 'p', '', paragraph);
        });
        container.appendChild(body);

        appendTextElement(container, 'p', 'note-intent', note.note);
    }

    renderNoteDetail();
    </script>
</body>
