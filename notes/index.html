    <script src="../editor-notes.js?v=editor-notes-directors-20260625"></script>
    <script>
    function renderNotesIndex() {
        const container = document.getElementById('notes-list');
        const notes = window.editorNotes || [];

        if (!container || notes.length === 0) {
            return;
        }

        container.innerHTML = '';

        notes.forEach(note => {
            const link = document.createElement('a');
            link.className = 'note-card';
            link.href = `${note.slug}.html`;
            link.innerHTML = `
                <p class="note-card-director">${note.director}</p>
                <p class="note-card-heading">${note.heading}</p>
                <p class="note-card-film">『${note.featuredFilm.title}』</p>
                <span class="note-card-link">続きを読む →</span>
            `;
            container.appendChild(link);
        });
    }

    renderNotesIndex();
    </script>
