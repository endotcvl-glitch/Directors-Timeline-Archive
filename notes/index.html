    <script>
    function renderNotesIndex() {
        const container = document.getElementById('notes-list');
        const notes = window.editorNotes || [];

        if (!container || notes.length === 0) {
            return;
        }

        container.innerHTML = '';

        [...notes].reverse().forEach(note => {
            const link = document.createElement('a');
            link.className = 'note-card';
            link.href = `${note.slug}.html`;
            link.innerHTML = `
                <p class="note-card-director-ja">${note.directorJa}</p>
                <p class="note-card-film-ja">${formatNoteFilmTitles(note)}</p>
                <span class="note-card-link">続きを読む →</span>
            `;
            container.appendChild(link);
        });
    }

    function formatNoteFilmTitles(note) {
        const films = note.featuredFilms || (note.featuredFilm ? [note.featuredFilm] : []);

        return films.map(film => film.titleJa).join('／');
    }

    renderNotesIndex();
    </script>
